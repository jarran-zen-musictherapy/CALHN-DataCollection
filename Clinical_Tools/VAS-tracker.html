<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Music Therapy — Mood</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #FAFAF8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  #app { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 24px; }
  textarea:focus { border-color: #94A3B8 !important; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const e = React.createElement;
const { useState, useEffect } = React;

const FACE_COUNT = 7;
const FACES = Array.from({ length: FACE_COUNT }, (_, i) => {
  const t = i / (FACE_COUNT - 1);
  return {
    score: i + 1,
    color: `hsl(${t * 140}, ${65 + t * 10}%, ${42 + t * 8}%)`,
    bg: `hsl(${t * 140}, ${65 + t * 10}%, 95%)`,
    t,
  };
});

function Smiley({ face, size, selected, muted, onTap }) {
  size = size || 80;
  const cx = size / 2, cy = size / 2, r = size * 0.42;
  const eyeY = cy - r * 0.15, esp = r * 0.36, er = size * 0.05;
  const my = cy + r * 0.24, mw = r * 0.48;
  const curve = -10 + face.t * 22;
  const sc = selected ? '#fff' : '#555';

  let eyes;
  if (face.t < 0.35) {
    eyes = [
      e('ellipse', { key: 'el', cx: cx - esp, cy: eyeY, rx: er, ry: er * 1.3, fill: sc }),
      e('ellipse', { key: 'er', cx: cx + esp, cy: eyeY, rx: er, ry: er * 1.3, fill: sc }),
    ];
  } else if (face.t > 0.65) {
    eyes = [
      e('path', { key: 'el', d: `M ${cx-esp-er*1.3} ${eyeY} Q ${cx-esp} ${eyeY-er*2.2}, ${cx-esp+er*1.3} ${eyeY}`, stroke: sc, strokeWidth: 2, fill: 'none', strokeLinecap: 'round' }),
      e('path', { key: 'er', d: `M ${cx+esp-er*1.3} ${eyeY} Q ${cx+esp} ${eyeY-er*2.2}, ${cx+esp+er*1.3} ${eyeY}`, stroke: sc, strokeWidth: 2, fill: 'none', strokeLinecap: 'round' }),
    ];
  } else {
    eyes = [
      e('circle', { key: 'el', cx: cx - esp, cy: eyeY, r: er, fill: sc }),
      e('circle', { key: 'er', cx: cx + esp, cy: eyeY, r: er, fill: sc }),
    ];
  }

  return e('button', {
    onClick: () => onTap(face.score),
    style: {
      background: 'none', border: 'none', cursor: 'pointer', padding: 0, outline: 'none',
      transition: 'transform 0.15s ease, opacity 0.15s ease',
      transform: selected ? 'scale(1.2)' : 'scale(1)',
      opacity: muted ? 0.3 : 1,
    },
    'aria-label': 'Score ' + face.score,
  },
    e('svg', { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
      e('circle', { cx, cy, r, fill: selected ? face.color : face.bg, stroke: face.color, strokeWidth: selected ? 3.5 : 2 }),
      ...eyes,
      e('path', { d: `M ${cx-mw} ${my} Q ${cx} ${my+curve}, ${cx+mw} ${my}`, stroke: sc, strokeWidth: 2.2, fill: 'none', strokeLinecap: 'round' }),
    )
  );
}

function FaceRow({ label, faces, value, onTap, visible }) {
  return e('div', {
    style: {
      textAlign: 'center', marginBottom: 16,
      transition: 'all 0.4s cubic-bezier(0.25,0.46,0.45,0.94)',
      opacity: visible ? 1 : 0,
      transform: visible ? 'translateY(0)' : 'translateY(24px)',
      pointerEvents: visible ? 'auto' : 'none',
    }
  },
    e('div', { style: { fontSize: 13, fontWeight: 600, color: '#94A3B8', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 10 } }, label),
    e('div', { style: { display: 'flex', justifyContent: 'center', gap: 8 } },
      faces.map(f => e(Smiley, {
        key: f.score, face: f, size: 80,
        selected: value === f.score,
        muted: value !== null && value !== f.score,
        onTap,
      }))
    )
  );
}

function App() {
  const [pre, setPre] = useState(null);
  const [post, setPost] = useState(null);
  const [notes, setNotes] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [showPost, setShowPost] = useState(false);
  const [showDone, setShowDone] = useState(false);
  const [isSubmitting, setIsSubmitting] = useState(false);

  // Your updated Google Apps Script URL
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYmUJtxJlmdg7Wqf7cXBhkfvj0mF5NF2ruDpPJRND4fSru-RU3FSsp1rozHg3MOcCO/exec';

  useEffect(() => {
    if (pre !== null && !showPost) {
      const t = setTimeout(() => setShowPost(true), 300);
      return () => clearTimeout(t);
    }
  }, [pre, showPost]);

  useEffect(() => {
    if (post !== null && !showDone) {
      const t = setTimeout(() => setShowDone(true), 200);
      return () => clearTimeout(t);
    }
  }, [post, showDone]);

  const reset = () => {
    setPre(null); setPost(null); setNotes('');
    setSubmitted(false); setShowPost(false); setShowDone(false);
  };

  const handleSubmit = async () => {
    setIsSubmitting(true);
    const timestamp = new Date().toLocaleString('en-AU', {
      timeZone: 'Australia/Adelaide',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false
    });
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ pre: pre, post: post, notes: notes, timestamp: timestamp }),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      });
      setSubmitted(true);
    } catch (error) {
      console.error('Error submitting data:', error);
      alert('There was an issue saving your response. Please try again.');
    } finally {
      setIsSubmitting(false);
    }
  };

  if (submitted) {
    const diff = post - pre;
    const ds = diff > 0 ? '+' + diff : '' + diff;
    const dc = diff > 0 ? '#2E8B57' : diff < 0 ? '#D94F4F' : '#64748B';
    return e('div', { style: { textAlign: 'center' } },
      e('div', { style: { background: '#fff', borderRadius: 20, padding: '32px 40px', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', display: 'inline-block' } },
        e('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 28, marginBottom: 24 } },
          e('div', null,
            e('div', { style: { fontSize: 12, color: '#94A3B8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 4 } }, 'Before'),
            e(Smiley, { face: FACES[pre - 1], size: 60, selected: true, onTap: () => {} }),
          ),
          e('div', { style: { fontSize: 26, color: '#CBD5E1' } }, '→'),
          e('div', null,
            e('div', { style: { fontSize: 12, color: '#94A3B8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 4 } }, 'After'),
            e(Smiley, { face: FACES[post - 1], size: 60, selected: true, onTap: () => {} }),
          ),
          e('div', { style: { padding: '8px 18px', borderRadius: 12, background: diff > 0 ? '#ECFDF5' : diff < 0 ? '#FEF2F2' : '#F8FAFC' } },
            e('div', { style: { fontSize: 11, color: '#94A3B8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 2 } }, 'Change'),
            e('div', { style: { fontSize: 30, fontWeight: 700, color: dc, lineHeight: 1 } }, ds),
          ),
        ),
        e('button', { onClick: reset, style: { padding: '14px 40px', borderRadius: 12, border: '2px solid #E2E8F0', background: '#fff', color: '#475569', fontSize: 16, fontWeight: 600, cursor: 'pointer' } }, 'New Session'),
      )
    );
  }

  return e('div', { style: { width: '100%', maxWidth: '600px', display: 'flex', flexDirection: 'column', alignItems: 'center' } },
    e('div', { style: { textAlign: 'center', marginBottom: 28 } },
      e('div', { style: { fontSize: 12, color: '#94A3B8', letterSpacing: '0.06em', marginBottom: 4 } }, 'CALHN MUSIC THERAPY'),
      e('h1', { style: { fontSize: 28, fontWeight: 600, color: '#1E293B', letterSpacing: '-0.02em' } }, 'How are you feeling?'),
    ),
    e(FaceRow, { label: 'Before Session', faces: FACES, value: pre, onTap: v => setPre(v), visible: true }),
    e(FaceRow, { label: 'After Session', faces: FACES, value: post, onTap: v => setPost(v), visible: showPost }),
    
    // Notes and Done button section
    e('div', {
      style: {
        width: '100%', maxWidth: '400px', display: 'flex', flexDirection: 'column', gap: '16px', marginTop: 16,
        transition: 'all 0.35s cubic-bezier(0.25,0.46,0.45,0.94)',
        opacity: showDone ? 1 : 0,
        transform: showDone ? 'translateY(0)' : 'translateY(16px)',
        pointerEvents: showDone ? 'auto' : 'none',
      }
    },
      e('textarea', {
        value: notes,
        onChange: (e) => setNotes(e.target.value),
        placeholder: 'Any notes or feedback from the session? (Optional)',
        style: {
          width: '100%', height: '100px', padding: '16px', borderRadius: '12px',
          border: '2px solid #E2E8F0', outline: 'none', resize: 'vertical',
          fontSize: '15px', fontFamily: 'inherit', color: '#334155',
          transition: 'border-color 0.2s ease', background: '#fff'
        }
      }),
      e('button', {
        onClick: handleSubmit,
        disabled: isSubmitting,
        style: { 
          padding: '16px 0', width: '100%', borderRadius: '12px', border: 'none', 
          background: isSubmitting ? '#94A3B8' : '#2E8B57', color: '#fff', 
          fontSize: 18, fontWeight: 600, cursor: isSubmitting ? 'not-allowed' : 'pointer', 
          boxShadow: isSubmitting ? 'none' : '0 3px 10px rgba(46,139,87,0.3)',
          transition: 'background 0.2s ease'
        },
      }, isSubmitting ? 'Saving...' : 'Submit ✓')
    ),
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(e(App));
</script>
</body>
</html>
