<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affective Colour Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: rgb(14,15,19);
    color: #e8e6df;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: background-color 0.6s ease;
    overflow-x: hidden;
  }

  /* ── Header ──────────────────────────────────────────────────── */
  .step-header {
    width: 100%;
    max-width: 600px;
    padding: 1.5rem 1.5rem 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }

  /* ── Wheel & Legend ─────────────────────────────────────────── */
  .wheel-stage {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 2vh;
  }

  .wheel-container {
    position: relative;
    width: min(78vw, 440px);
    height: min(78vw, 440px);
    cursor: crosshair;
  }

  .label-ring {
    position: absolute;
    inset: -38px;
    pointer-events: none;
    z-index: 1;
  }

  .segment-label {
    position: absolute;
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.25);
    transform: translate(-50%, -50%);
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .segment-label.active { 
    color: #fff; 
    font-weight: 700; 
    font-size: 0.7rem; 
    text-shadow: 0 0 12px rgba(255,255,255,0.6); 
  }

  canvas.wheel {
    width: 100%; height: 100%;
    border-radius: 50%;
    display: block;
    box-shadow: 0 10px 60px rgba(0,0,0,0.8);
    z-index: 2;
  }

  .pin {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 3px solid #fff;
    transform: translate(-50%,-50%);
    pointer-events: none;
    display: none;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    z-index: 10;
  }

  /* ── Readout ─────────────────────────────────────────────────── */
  .readout { text-align: center; margin-top: 2rem; min-height: 5.5rem; }
  .readout-emotion { font-family: 'DM Serif Display', serif; font-size: 3.2rem; font-style: italic; line-height: 1; margin-bottom: 0.2rem;}
  .readout-family { font-size: 0.75rem; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  /* ── Controls ────────────────────────────────────────────────── */
  .controls { width: min(85vw, 480px); margin-top: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  .intensity-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; margin: 1.2rem 0; }
  .intensity-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.2s; width: 0%; }
  
  textarea {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: #fff; font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 1rem; resize: none; height: 70px; outline: none;
  }

  /* ── Actions ─────────────────────────────────────────────────── */
  .step-actions { margin-top: auto; padding: 2rem 0 3rem; }
  button.primary {
    background: #fff; color: #000; font-weight: 700; font-family: 'DM Mono', monospace;
    font-size: 0.8rem; text-transform: uppercase; padding: 1.2rem 3.5rem; border: none;
    border-radius: 50px; cursor: pointer; transition: all 0.2s;
  }
  button.primary:disabled { opacity: 0.2; cursor: default; }

  /* ── Summary Screen ──────────────────────────────────────────── */
  #summaryScreen { display: none; width: 100%; max-width: 500px; padding: 3rem 1.5rem; flex-direction: column; align-items: center; gap: 2rem; }
  .summary-title { font-family: 'DM Serif Display', serif; font-size: 2.2rem; font-style: italic; color: #e8e6df; }
  .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; }
  .summary-card { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
  .shift-box { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 1.5rem; font-size: 0.85rem; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div id="stepScreen">
  <div class="step-header"><div class="step-label" id="stepLabel">Pre-Session Affect</div></div>

  <div class="wheel-stage">
    <div class="wheel-container" id="wheelContainer">
      <div class="label-ring" id="labelRing"></div>
      <canvas class="wheel" id="wheelCanvas" width="800" height="800"></canvas>
      <div class="pin" id="wheelPin"></div>
    </div>

    <div class="readout">
      <div class="readout-emotion" id="readoutEmotion"></div>
      <div class="readout-family" id="readoutFamily"></div>
    </div>

    <div class="controls" id="controls">
      <div style="font-size: 0.55rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em;">Intensity: <span id="intText"></span></div>
      <div class="intensity-bar"><div class="intensity-fill" id="intFill"></div></div>
      <textarea id="noteText" placeholder="Session focus or observations..."></textarea>
    </div>
  </div>

  <div class="step-actions">
    <button class="primary" id="stepBtn" onclick="advanceStep()" disabled>Continue</button>
  </div>
</div>

<div id="summaryScreen">
  <div class="summary-title">Affective Shift</div>
  <div class="summary-cards" id="summaryCards"></div>
  <div class="shift-box" id="shiftBox"></div>
  
  <div style="display:flex; flex-direction:column; gap:1rem; width:100%; align-items:center;">
    <button class="primary" id="saveBtn" style="width:100%;" onclick="saveRecord()">Save to Log</button>
    <button style="background:none; border:none; color:rgba(255,255,255,0.4); cursor:pointer; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; padding:1rem;" onclick="exportCSV()">Download CSV History</button>
  </div>
</div>

<script>
// 1. Corrected Data: Top (0) is Red, Right (90) is Green-Yellow, Bottom (180) is Cyan, Left (270) is Violet.
const SEGMENTS = [
  { hue: 0,   label: 'Angry',     family: 'Tension' }, 
  { hue: 30,  label: 'Anxious',   family: 'Fear' },    
  { hue: 60,  label: 'Alert',     family: 'Arousal' }, 
  { hue: 90,  label: 'Happy',     family: 'Joy' },     
  { hue: 120, label: 'Content',   family: 'Joy' },     
  { hue: 150, label: 'Calm',      family: 'Peace' },   
  { hue: 180, label: 'Relaxed',   family: 'Peace' },   
  { hue: 210, label: 'Withdrawn', family: 'Low' },     
  { hue: 240, label: 'Sad',       family: 'Low' },     
  { hue: 270, label: 'Tired',     family: 'Low' },     
  { hue: 300, label: 'Numb',      family: 'Loss' },    
  { hue: 330, label: 'Grief',     family: 'Loss' }   
];

// 2. Align Labels: Top is 0 degrees (CSS -90 degrees)
const ring = document.getElementById('labelRing');
SEGMENTS.forEach((s, i) => {
  const label = document.createElement('div');
  label.className = 'segment-label';
  label.id = 'lbl-' + i;
  label.textContent = s.label;
  const angle = (s.hue - 90) * (Math.PI / 180);
  const radius = 53; 
  label.style.top = (50 + radius * Math.sin(angle)) + '%';
  label.style.left = (50 + radius * Math.cos(angle)) + '%';
  ring.appendChild(label);
});

// 3. Draw Visual Wheel: Shift drawing so 0 is exactly at the top (-90 offset)
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

(function drawWheel() {
  const cx = canvas.width / 2;
  for (let a = 0; a < 360; a++) {
    const g = ctx.createRadialGradient(cx, cx, cx * 0.05, cx, cx, cx);
    g.addColorStop(0, `#ffffff`); 
    g.addColorStop(0.5, `hsla(${a}, 80%, 60%, 1)`);
    g.addColorStop(1, `hsla(${a}, 100%, 35%, 1)`);
    ctx.beginPath();
    ctx.moveTo(cx, cx);
    // Shift by 90 so HUE 0 = TOP
    ctx.arc(cx, cx, cx, (a - 91.5) * Math.PI / 180, (a - 88.5) * Math.PI / 180);
    ctx.fillStyle = g;
    ctx.fill();
  }
})();

// Solid color blender to prevent milky pastels
function floodBg(r, g, b, alpha) {
  document.body.style.backgroundColor =
    'rgb(' + Math.round(14 + (r - 14) * alpha) + ',' +
             Math.round(15 + (g - 15) * alpha) + ',' +
             Math.round(19 + (b - 19) * alpha) + ')';
}

function rgbToHex(r, g, b) {
  return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
}

let step = 0;
let captured = { pre: null, post: null };
let records = JSON.parse(localStorage.getItem('affective_colour_logs') || '[]');

function handleTap(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const px = (clientX - rect.left) * sx;
  const py = (clientY - rect.top) * sx;
  const cx = canvas.width/2;
  const dist = Math.sqrt((px-cx)**2 + (py-cx)**2);
  if(dist > cx) return;

  // Spatial Intensity
  const intensity = Math.max(1, Math.min(10, Math.round((dist / cx) * 10)));
  
  // Angle for Hue: atan2 puts 0 at right. +90 puts 0 at top.
  let angle = Math.atan2(py - cx, px - cx) * (180 / Math.PI);
  angle = (angle + 90) % 360;
  if (angle < 0) angle += 360;

  // Find Closest Segment Math
  let bestIdx = 0, minDiff = 360;
  SEGMENTS.forEach((s, i) => {
    let diff = Math.abs(s.hue - angle);
    if (diff > 180) diff = 360 - diff;
    if (diff < minDiff) { minDiff = diff; bestIdx = i; }
  });

  const data = ctx.getImageData(px, py, 1, 1).data;
  const hex = rgbToHex(data[0], data[1], data[2]);

  // Dynamic Background: Links visual intensity of color to the background flood
  floodBg(data[0], data[1], data[2], (intensity / 10) * 0.45);

  // UI Updates
  document.querySelectorAll('.segment-label').forEach(l => l.classList.remove('active'));
  document.getElementById('lbl-' + bestIdx).classList.add('active');

  const pin = document.getElementById('wheelPin');
  pin.style.display = 'block';
  pin.style.left = (px/canvas.width*100)+'%';
  pin.style.top = (py/canvas.height*100)+'%';
  pin.style.backgroundColor = hex;

  document.getElementById('readoutEmotion').textContent = SEGMENTS[bestIdx].label;
  document.getElementById('readoutFamily').textContent = SEGMENTS[bestIdx].family;
  document.getElementById('intFill').style.width = (intensity * 10) + '%';
  document.getElementById('intText').textContent = intensity + "/10";
  
  const controls = document.getElementById('controls');
  controls.style.opacity = '1';
  controls.style.pointerEvents = 'auto';
  document.getElementById('stepBtn').disabled = false;

  captured[step===0?'pre':'post'] = { 
    label: SEGMENTS[bestIdx].label, 
    family: SEGMENTS[bestIdx].family, 
    intensity: intensity,
    hex: hex,
    r: data[0], g: data[1], b: data[2]
  };
}

canvas.addEventListener('mousedown', handleTap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); }, {passive:false});

function advanceStep() {
  if(step === 0) {
    captured.pre.note = document.getElementById('noteText').value;
    step = 1;
    document.getElementById('stepLabel').textContent = "Post-Session Affect";
    document.getElementById('wheelPin').style.display = 'none';
    document.getElementById('readoutEmotion').textContent = '';
    document.getElementById('readoutFamily').textContent = '';
    document.getElementById('noteText').value = '';
    document.getElementById('stepBtn').disabled = true;
    
    const controls = document.getElementById('controls');
    controls.style.opacity = '0';
    controls.style.pointerEvents = 'none';
    
    document.body.style.backgroundColor = 'rgb(14,15,19)';
    document.querySelectorAll('.segment-label').forEach(l => l.classList.remove('active'));
  } else {
    captured.post.note = document.getElementById('noteText').value;
    showSummary();
  }
}

function showSummary() {
  document.getElementById('stepScreen').style.display = 'none';
  document.getElementById('summaryScreen').style.display = 'flex';
  
  document.getElementById('summaryCards').innerHTML = ['pre', 'post'].map(k => `
    <div class="summary-card">
      <div style="font-size:0.6rem; opacity:0.5; margin-bottom:0.6rem; letter-spacing:0.1em; text-transform:uppercase;">${k}</div>
      <div style="font-family:'DM Serif Display'; font-size:1.8rem; margin-bottom:0.5rem;">${captured[k].label}</div>
      <div style="font-size:0.75rem; color:${captured[k].hex}; font-weight:700; display:flex; align-items:center; gap:0.4rem;">
        <div style="width:12px; height:12px; border-radius:50%; background:${captured[k].hex}; border:1px solid rgba(255,255,255,0.2);"></div>
        ${captured[k].hex}
      </div>
      <div style="font-size:0.75rem; margin-top:0.6rem; opacity:0.7;">Intensity: ${captured[k].intensity}/10</div>
    </div>
  `).join('');

  const diff = captured.post.intensity - captured.pre.intensity;
  document.getElementById('shiftBox').innerHTML = `
    Shifted from <strong>${captured.pre.label}</strong> to <strong>${captured.post.label}</strong>.<br>
    Intensity change: <strong>${diff > 0 ? '+' : ''}${diff} points</strong>.
  `;
  floodBg(captured.post.r, captured.post.g, captured.post.b, 0.25);
}

// THE GOOGLE SHEETS WEBHOOK URL
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwG32LVM1yUOuojKADKUNN80YbVN0RJo6AS1yBLu26cbatyMsEW7DkbaN_c-7FV9Sqc/exec";

function saveRecord() {
  const record = {
    timestamp: new Date().toISOString(),
    preScore: captured.pre.intensity,
    postScore: captured.post.intensity,
    scoreChange: captured.post.intensity - captured.pre.intensity,
    preHex: captured.pre.hex,
    postHex: captured.post.hex,
    preEmotion: captured.pre.label,
    postEmotion: captured.post.label,
    preNote: captured.pre.note || "",
    postNote: captured.post.note || ""
  };

  // 1. Save locally as backup
  records.push(record);
  localStorage.setItem('affective_colour_logs', JSON.stringify(records));

  // 2. Change button text to show it's working
  const btn = document.getElementById('saveBtn');
  btn.textContent = "Syncing...";
  btn.disabled = true;

  // 3. Send to Google Sheets
  fetch(WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(record)
  }).then(() => {
    alert('Session Logged & Synced to Sheet.');
    location.reload();
  }).catch(err => {
    alert('Saved locally, but sync failed. Check connection.');
    location.reload();
  });
}

function exportCSV() {
  if(!records.length) return alert("No logs found to export.");
  const keys = Object.keys(records[0]);
  const csv = [keys.join(","), ...records.map(r => keys.map(k => `"${(r[k]||'').toString().replace(/"/g, '""')}"`).join(","))].join("\n");
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Affective_Colour_Log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
